<h2>Student Profile</h2>

<form

[formGroup]="profileForm"

(ngSubmit)="submit()"

>

<label>Name</label>

<input

type="text"

formControlName="name"

>

<div

*ngIf="
profileForm.get('name')?.touched &&
profileForm.get('name')?.invalid
"

style="color:red"

>

Name is required

</div>

<br>

<label>Email</label>

<input

type="email"

formControlName="email"

>

<div

*ngIf="
profileForm.get('email')?.touched &&
profileForm.get('email')?.errors?.['required']
"

style="color:red"

>

Email is required

</div>

<div

*ngIf="
profileForm.get('email')?.touched &&
profileForm.get('email')?.errors?.['email']
"

style="color:red"

>

Enter a valid email

</div>

<br>

<label>Semester</label>

<input

type="number"

formControlName="semester"

>

<div

*ngIf="
profileForm.get('semester')?.touched &&
profileForm.get('semester')?.invalid
"

style="color:red"

>

Semester should be between 1 and 8

</div>

<br><br>

<button

type="submit"

[disabled]="profileForm.invalid"

>

Submit

</button>

</form>
